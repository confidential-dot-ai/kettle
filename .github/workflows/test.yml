name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:
    types: [ checks_requested ]
  workflow_dispatch:

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans sources
    # Prevent sudden announcement of a new advisory from failing ci:
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - name: Run linters
        run: ./bin/lint

  run-tests:
    name: Run tests
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - macos-15-intel # mac-x86
          - macos-latest # mac-arm
          - ubuntu-latest # linux-x86
          - ubuntu-24.04-arm # linux-arm

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - name: Run non-TEE tests
        shell: bash
        run: ./bin/test

  build:
    name: Build Kettle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: kettle
          path: target/release/kettle
          if-no-files-found: error

  build-projects:
    needs: [ build ]
    name: Build ${{ matrix.project }} with Kettle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ ripgrep, eza, openclaw, kettle ]
        include:
          - project: ripgrep
            owner: burntsushi
            toolchain: rust
            ref: 4519153e5e461527f4bca45b042fff45c4ec6fb9
          - project: eza
            owner: eza-community
            toolchain: nix
            ref: eed27ed05e74542af5852aed40e3dbff87d69c43
          - project: openclaw
            owner: openclaw
            toolchain: pnpm
            ref: d518260bb8261bb179cfb421a8c166915bb59dd1
          - project: kettle
            owner: ${{ github.repository_owner }}
            toolchain: rust
            ref: ${{ github.sha }}
    steps:
      - name: Check out ${{ matrix.project }}
        uses: actions/checkout@v6
        with:
          repository: "${{ matrix.owner }}/${{ matrix.project }}"
          ref: "${{ matrix.ref }}"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: ${{ matrix.toolchain == 'rust' }}
      - uses: cachix/install-nix-action@v31
        if: ${{ matrix.toolchain == 'nix' }}
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        if: ${{ matrix.toolchain == 'pnpm' }}
      - uses: actions/download-artifact@v8
        with:
          name: kettle
      - run: |
          chmod +x kettle
          ./kettle build $GITHUB_WORKSPACE
